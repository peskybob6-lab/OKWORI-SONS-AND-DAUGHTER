<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel – Okwori Sons & Daughters</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #2c3e50, #4b79a1); /* measured background */
      color: #fff;
    }

    /* Header */
    .header {
      background: #1a252f;
      padding: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .header h1 { margin: 0; font-size: 20px; }
    .logout-btn {
      background: red;
      color: #fff;
      border: none;
      padding: 6px 12px;
      border-radius: 4px;
      cursor: pointer;
    }

    /* Layout */
    .container {
      display: flex;
      min-height: calc(100vh - 50px);
    }

    /* Sidebar */
    .sidebar {
      width: 220px;
      background: #2c3e50;
      padding: 20px;
    }
    .sidebar a {
      display: block;
      color: #fff;
      padding: 10px;
      margin-bottom: 10px;
      text-decoration: none;
      border-radius: 4px;
    }
    .sidebar a:hover {
      background: #4b79a1;
    }

    /* Main content */
    .main {
      flex: 1;
      background: #f4f4f4;
      color: #000;
      padding: 20px;
    }
    .card {
      background: #fff;
      padding: 15px;
      margin-bottom: 20px;
      border-radius: 6px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    }
    .card h2 { margin-top: 0; }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    table, th, td {
      border: 1px solid #ccc;
    }
    th, td {
      padding: 8px;
      text-align: left;
    }
    .btn {
      padding: 4px 8px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    .btn-danger { background: red; color: #fff; }
    .btn-edit { background: #4b79a1; color: #fff; }
  </style>
</head>
<body>
  <!-- Header -->
  <div class="header">
    <h1>Admin Panel – Okwori Sons & Daughters</h1>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>

  <!-- Layout -->
  <div class="container">
    <!-- Sidebar -->
    <div class="sidebar">
      <a href="#" onclick="showSection('users')">Users</a>
      <a href="#" onclick="showSection('posts')">Posts</a>
      <a href="#" onclick="showSection('messaging')">Messaging</a>
      <a href="#" onclick="showSection('analytics')">Analytics</a>
    </div>

    <!-- Main content -->
    <div class="main">
      <!-- Users -->
      <div id="users" class="card">
        <h2>User Management</h2>
        <table>
          <tr><th>Name</th><th>Phone</th><th>Email</th><th>Gender</th><th>Actions</th></tr>
          <tr>
            <td>Joel Ogah</td><td>08110784273</td><td>ogahpesky@g..</td><td>Male</td>
            <td>
              <button class="btn btn-edit">Edit</button>
              <button class="btn btn-danger">Remove</button>
            </td>
          </tr>
          <tr>
            <td>Ode Aka</td><td>090766554</td><td>ode@g..</td><td>Female</td>
            <td>
              <button class="btn btn-edit">Edit</button>
              <button class="btn btn-danger">Remove</button>
            </td>
          </tr>
        </table>
      </div>

      <!-- Posts -->
      <div id="posts" class="card" style="display:none;">
        <h2>Post Management</h2>
        <input type="text" id="postTitle" placeholder="Post Title"><br><br>
        <textarea id="postContent" placeholder="Write your post here..." rows="5" style="width:100%;"></textarea><br><br>
        <button class="btn btn-edit" onclick="createPost()">Publish Post</button>
      </div>

      <!-- Messaging -->
      <div id="messaging" class="card" style="display:none;">
        <h2>Mass Messaging</h2>
        <input type="text" id="msgSubject" placeholder="Message Subject"><br><br>
        <textarea id="msgBody" placeholder="Write your message..." rows="5" style="width:100%;"></textarea><br><br>
        <button class="btn btn-edit" onclick="sendMessage()">Send to All Users</button>
      </div>

      <!-- Analytics -->
      <div id="analytics" class="card" style="display:none;">
        <h2>Analytics Dashboard</h2>
        <p>Total Users: <span id="totalUsers">2</span></p>
        <p>Posts Created: <span id="totalPosts">0</span></p>
        <p>Messages Sent: <span id="totalMessages">0</span></p>
      </div>
    </div>
  </div>

  <!-- Script -->
  <script>
    function showSection(section) {
      document.getElementById('users').style.display = 'none';
      document.getElementById('posts').style.display = 'none';
      document.getElementById('messaging').style.display = 'none';
      document.getElementById('analytics').style.display = 'none';
      document.getElementById(section).style.display = 'block';
    }

    function logout() {
      alert("Logging out...");
      // TODO: Firebase Auth signOut()
    }

    function createPost() {
      const title = document.getElementById('postTitle').value;
      const content = document.getElementById('postContent').value;
      alert("Post created: " + title);
      // TODO: Save to Firestore
    }

    function sendMessage() {
      const subject = document.getElementById('msgSubject').value;
      const body = document.getElementById('msgBody').value;
      alert("Message sent: " + subject);
      // TODO: Add to Firestore + trigger Cloud Function for email
    }
  </script>
</body>
</html>
